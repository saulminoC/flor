<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Fondo base oscuro por si tarda en cargar el canvas */
            background-color: #020111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Dancing Script', cursive; 
        }
        canvas {
            display: block;
            max-width: 100%; 
            max-height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="florCanvas"></canvas>

    <script>
        const canvas = document.getElementById('florCanvas');
        const ctx = canvas.getContext('2d');

        // Variables de la flor y texto
        const totalPetalos = 16; // Menos pétalos para más elegancia
        let progresoFlor = 0; // Controla la aparición lenta de los pétalos
        let escalaCentro = 0; 
        let opacidadTexto = 0; 
        let centroX, centroY;

        // Variables del fondo estelar
        const estrellas = [];
        const cometas = [];

        function ajustarCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            centroX = canvas.width / 2;
            centroY = canvas.height / 2; 
        }
        window.addEventListener('resize', ajustarCanvas);
        ajustarCanvas();

        // --- Crear Fondo Estrellado ---
        for (let i = 0; i < 150; i++) {
            estrellas.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5 + 0.5,
                alpha: Math.random(),
                cambioAlpha: (Math.random() * 0.02) - 0.01 // Velocidad de parpadeo
            });
        }

        // --- Crear Cometas ---
        class Cometa {
            constructor() {
                this.reset();
                this.retraso = Math.random() * 300; // Retraso inicial
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.longitud = Math.random() * 100 + 50;
                this.velocidad = Math.random() * 8 + 6;
                this.angulo = Math.PI / 4; // 45 grados en diagonal
                this.opacidad = Math.random() * 0.6 + 0.2;
                this.retraso = Math.random() * 200 + 100; // Tiempo entre cometas
            }
            dibujar() {
                if (this.retraso > 0) {
                    this.retraso--;
                    return;
                }
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angulo);
                
                // Efecto de estela del cometa
                let grad = ctx.createLinearGradient(0, 0, -this.longitud, 0);
                grad.addColorStop(0, `rgba(255, 255, 255, ${this.opacidad})`);
                grad.addColorStop(1, `rgba(255, 255, 255, 0)`);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-this.longitud, 0);
                ctx.lineWidth = 2;
                ctx.strokeStyle = grad;
                ctx.stroke();
                ctx.restore();

                // Movimiento
                this.x += Math.cos(this.angulo) * this.velocidad;
                this.y += Math.sin(this.angulo) * this.velocidad;

                // Reiniciar si sale de la pantalla
                if (this.x > canvas.width + 100 || this.y > canvas.height + 100) {
                    this.reset();
                }
            }
        }

        // Instanciar 3 cometas
        for(let i=0; i<3; i++) cometas.push(new Cometa());


        // --- Funciones de Dibujo de la Flor ---

        function dibujarTallo(x, y) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x - 30, y + 100, x + 20, y + 200, x - 10, y + 400);
            ctx.lineWidth = 12;
            ctx.strokeStyle = '#2dba67'; 
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function dibujarPetalo(x, y, rotacion) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotacion);

            ctx.beginPath();
            ctx.moveTo(0, 0);
            // Forma de pétalo más natural y hermosa
            ctx.bezierCurveTo(40, -50, 130, -40, 160, 0);
            ctx.bezierCurveTo(130, 40, 40, 50, 0, 0);
            ctx.closePath();

            // Degradado del pétalo
            let grad = ctx.createLinearGradient(0, 0, 160, 0);
            grad.addColorStop(0, '#ffeb3b'); // Amarillo muy vivo en la base
            grad.addColorStop(1, '#f39c12'); // Naranja en la punta
            ctx.fillStyle = grad;
            ctx.fill();

            // Línea de detalle en el centro del pétalo
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(80, -5, 140, 0);
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(211, 84, 0, 0.4)';
            ctx.stroke();

            // Borde sutil
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#e67e22'; 
            ctx.stroke();

            ctx.restore();
        }

        function dibujarCentro(x, y, escala) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(escala, escala); 

            ctx.beginPath();
            ctx.arc(0, 0, 45, 0, Math.PI * 2); // Centro un poco más grande
            
            let grad = ctx.createRadialGradient(0, 0, 5, 0, 0, 45);
            grad.addColorStop(0, '#5c2c16'); // Café muy oscuro
            grad.addColorStop(0.7, '#8e44ad'); // Tono morado profundo
            grad.addColorStop(1, '#d35400'); // Borde naranja tostado
            
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#3e1a0b';
            ctx.stroke();
            
            // Textura del centro (pequeños puntos)
            ctx.fillStyle = '#e67e22';
            for(let i=0; i<100; i++) {
                let ang = Math.random() * Math.PI * 2;
                let rad = Math.random() * 38;
                ctx.beginPath();
                ctx.arc(Math.cos(ang)*rad, Math.sin(ang)*rad, 1.5, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.restore();
        }

        function dibujarTextoFinal() {
            ctx.save();
            ctx.globalAlpha = opacidadTexto;
            ctx.font = "bold 80px 'Dancing Script', cursive";
            ctx.fillStyle = "#ffffff"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            ctx.shadowColor = "rgba(0, 0, 0, 0.9)"; 
            ctx.shadowBlur = 20;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            
            ctx.fillText("Te Amo", centroX, centroY);
            ctx.restore();
        }

        // --- Bucle de Animación Principal (60 FPS) ---

        function animar() {
            // 1. Dibujar fondo estelar (Limpia el frame anterior)
            let gradFondo = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradFondo.addColorStop(0, '#020111'); // Azul muy oscuro
            gradFondo.addColorStop(1, '#20124d'); // Morado nocturno
            ctx.fillStyle = gradFondo;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Animar y dibujar estrellas
            estrellas.forEach(estrella => {
                estrella.alpha += estrella.cambioAlpha;
                if(estrella.alpha <= 0 || estrella.alpha >= 1) {
                    estrella.cambioAlpha *= -1; // Invertir parpadeo
                }
                ctx.beginPath();
                ctx.arc(estrella.x, estrella.y, estrella.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, estrella.alpha)})`;
                ctx.fill();
            });

            // Dibujar cometas
            cometas.forEach(cometa => cometa.dibujar());

            // 2. Dibujar la flor
            dibujarTallo(centroX, centroY);
            
            // Calculamos cuántos pétalos dibujar en este momento
            let petalosActuales = Math.min(Math.floor(progresoFlor), totalPetalos);
            for(let i = 0; i < petalosActuales; i++) {
                dibujarPetalo(centroX, centroY, (Math.PI * 2 / totalPetalos) * i);
            }

            // Lógica de avance de la animación
            if (progresoFlor < totalPetalos) {
                // Velocidad de aparición de pétalos (más lento)
                progresoFlor += 0.08; 
            } else {
                // Animar el centro
                if (escalaCentro < 1) escalaCentro += 0.02;
                dibujarCentro(centroX, centroY, Math.min(escalaCentro, 1));
                
                // Animar el texto al final
                if (escalaCentro >= 1 && opacidadTexto < 1) {
                    opacidadTexto += 0.005; // Aparición muy suave
                }
            }

            // Dibujar el texto si su opacidad es mayor a 0
            if (opacidadTexto > 0) {
                dibujarTextoFinal();
            }

            // Llamar al siguiente frame
            requestAnimationFrame(animar);
        }

        // Iniciar animación
        animar();

    </script>
</body>
</html>
