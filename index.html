<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
body {
    margin: 0;
    padding: 0;
    background-color: #010008;
    overflow: hidden;
}
canvas {
    display: block;
}
</style>
</head>
<body>
<script>
let stars = [];
let comets = [];
let flowerLayer;
let petalRing = 6;
let currentPetal = 0;
let seedIndex = 0;
const maxSeeds = 450;
let phase = 0;
let textAlpha = 0;
let cx, cy;

function setup() {
    createCanvas(windowWidth, windowHeight);
    angleMode(DEGREES);
    cx = width / 2;
    cy = (height / 2) - 80; 
    
    flowerLayer = createGraphics(windowWidth, windowHeight);
    flowerLayer.angleMode(DEGREES);
    flowerLayer.translate(cx, cy);

    flowerLayer.strokeWeight(10);
    flowerLayer.stroke(34, 139, 34);
    flowerLayer.noFill();
    flowerLayer.bezier(0, 0, -20, 100, 20, 250, -10, height - cy + 100);

    for (let i = 0; i < 200; i++) {
        stars.push({
            x: random(width),
            y: random(height),
            r: random(0.5, 2.5),
            alpha: random(50, 255),
            speed: random(-3, 3)
        });
    }

    for (let i = 0; i < 6; i++) {
        comets.push(new Cometa());
    }
}

class Cometa {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = random(width);
        this.y = random(-100, -10);
        this.length = random(60, 180);
        this.speed = random(12, 22);
        this.angle = 45;
        this.delay = random(10, 200);
    }
    update() {
        if (this.delay > 0) {
            this.delay--;
            return;
        }
        this.x += cos(this.angle) * this.speed;
        this.y += sin(this.angle) * this.speed;
        if (this.x > width + 200 || this.y > height + 200) {
            this.reset();
        }
    }
    draw() {
        if (this.delay > 0) return;
        push();
        strokeWeight(3);
        let grad = drawingContext.createLinearGradient(this.x, this.y, this.x - cos(this.angle) * this.length, this.y - sin(this.angle) * this.length);
        grad.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        drawingContext.strokeStyle = grad;
        line(this.x, this.y, this.x - cos(this.angle) * this.length, this.y - sin(this.angle) * this.length);
        pop();
    }
}

function draw() {
    background(1, 0, 12, 60);

    noStroke();
    for (let s of stars) {
        fill(255, 255, 255, s.alpha);
        circle(s.x, s.y, s.r);
        s.alpha += s.speed;
        if (s.alpha <= 20 || s.alpha >= 255) s.speed *= -1;
    }

    for (let c of comets) {
        c.update();
        c.draw();
    }

    image(flowerLayer, 0, 0);

    if (frameCount % 3 === 0) {
        if (phase === 0) {
            drawPetalRing();
        } else if (phase === 1) {
            drawSeeds();
        }
    }

    if (phase === 2) {
        textAlpha += 1.5;
        if (textAlpha > 255) textAlpha = 255;
        push();
        textFont('Dancing Script');
        textSize(80);
        textAlign(CENTER, CENTER);
        fill(255, 255, 255, textAlpha);
        drawingContext.shadowColor = 'rgba(0,0,0,0.9)';
        drawingContext.shadowBlur = 15;
        text("Te Amo", cx, cy + 60);
        pop();
    }
}

function drawPetalRing() {
    if (petalRing < 0) {
        phase = 1;
        return;
    }

    let numPetals = 12 + petalRing * 6;
    let radius = 10 + petalRing * 8;
    let pAngle = 360 / numPetals;

    flowerLayer.push();
    flowerLayer.rotate(currentPetal * pAngle + (petalRing % 2 * 10));
    
    let petalLength = 60 + petalRing * 11;
    let petalWidth = 15 + petalRing * 4;

    let grad = flowerLayer.drawingContext.createLinearGradient(0, 0, petalLength, 0);
    grad.addColorStop(0, '#f39c12');
    grad.addColorStop(0.2, '#f1c40f');
    grad.addColorStop(1, '#fceabb');

    flowerLayer.fill(255);
    flowerLayer.drawingContext.fillStyle = grad;
    flowerLayer.stroke(211, 84, 0, 150);
    flowerLayer.strokeWeight(0.5);

    flowerLayer.beginShape();
    flowerLayer.vertex(radius, 0);
    flowerLayer.bezierVertex(radius + petalLength / 2, -petalWidth, radius + petalLength, -petalWidth / 4, radius + petalLength, 0);
    flowerLayer.bezierVertex(radius + petalLength, petalWidth / 4, radius + petalLength / 2, petalWidth, radius, 0);
    flowerLayer.endShape(CLOSE);
    
    flowerLayer.stroke(211, 84, 0, 90);
    flowerLayer.noFill();
    flowerLayer.bezier(radius, 0, radius + petalLength / 2, -3, radius + petalLength - 15, 0, radius + petalLength, 0);

    flowerLayer.pop();

    currentPetal++;
    if (currentPetal >= numPetals) {
        currentPetal = 0;
        petalRing--;
    }
}

function drawSeeds() {
    let maxPerFrame = 6;
    for (let i = 0; i < maxPerFrame; i++) {
        if (seedIndex > maxSeeds) {
            phase = 2;
            return;
        }

        let c = 3.5;
        let a = seedIndex * 137.5;
        let r = c * sqrt(seedIndex);

        let x = r * cos(a);
        let y = r * sin(a);

        flowerLayer.push();
        flowerLayer.translate(x, y);
        flowerLayer.rotate(a);
        
        let lerpFac = map(seedIndex, 0, maxSeeds, 0, 1);
        let col = lerpColor(color(40, 15, 0), color(160, 70, 0), lerpFac);
        
        flowerLayer.fill(col);
        flowerLayer.stroke(20, 5, 0, 100);
        flowerLayer.strokeWeight(0.5);
        flowerLayer.ellipse(0, 0, 5 + (seedIndex/maxSeeds)*3, 4 + (seedIndex/maxSeeds)*2);
        flowerLayer.pop();

        seedIndex++;
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    cx = width / 2;
    cy = (height / 2) - 80;
}
</script>
</body>
</html>
